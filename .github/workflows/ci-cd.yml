name: ASP.NET CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --no-build

  deploy:
    needs: build
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Publish app
        run: dotnet publish -c Release -o ./publish

      - name: Deploy local
        run: |
          cp -r ./publish/* /var/www/app
          systemctl restart myapp